<style>

/* Reset header and nav borders/shadows */
header,
nav{
    margin:0;
    padding:0;
    border:none;
    box-shadow:none;
}

/* Header */

.header-container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    flex-direction:column;
}

.header-container img{
    height:100px;
    width:auto;
    margin-bottom:10px;
}

.header-container h1{
    font-size:2rem;
    text-align:center;
    margin:0;
}

/* Navigation */

nav{
    background:#222;
    overflow-x:auto;
    padding:0;
    margin:0;
}

.nav-links{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:10px 0;
}

nav a{
    text-decoration:none;
    font-weight:bold;
    margin:0 20px;
    white-space:nowrap;
    font-size:1rem;

    background:linear-gradient(to top,#a77d2d,#f8d171);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

nav a:hover{
    opacity:.8;
}

nav a.active{
    background:none;
    color:#fff;
    -webkit-text-fill-color:#fff;
}

/* Main */

main{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.contact-info{
    text-align:center;
}

.contact-info h2{
    margin-bottom:20px;
}

.contact-info p{
    font-size:1.1rem;
    margin:12px 0;
}

.contact-info a{
    text-decoration:none;
}

main,
main h1,
main h2,
main h3,
main h4,
main h5,
main h6,
main p,
main span,
main strong,
main a{

    background:linear-gradient(to top,#a77d2d,#f8d171);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Social */

.social-icons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.social-icons a{
    font-size:1.2rem;
    text-decoration:none;
}

.social-icons i{
    margin-right:8px;
}

/* Footer */

footer{
    background:#111;
    color:#888;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

/* Responsive */

@media (max-width:768px){

    .header-container h1{
        font-size:1.6rem;
    }

    .header-container img{
        height:80px;
    }

    .nav-links{
        gap:10px;
    }

    nav a{
        margin:5px 8px;
    }

    main{
        padding:25px 15px;
    }

}

</style>
